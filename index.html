<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">
  <header id="topBar">
    <div class="top-left">
      <span class="brand">AI Chat</span>
      <span class="brand-tag" id="providerBadge">не подключено</span>
    </div>
    <div class="top-right">
      <button class="btn-ghost" onclick="toggleSettings()" id="settingsBtn">⚙️</button>
      <button class="btn-ghost" onclick="clearChat()">🗑️</button>
    </div>
  </header>

  <main id="content">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h1>AI Chat</h1>
      <p>Начните общаться с любой AI моделью</p>
      <button class="btn-primary" onclick="toggleSettings()">Подключить API</button>
    </div>

    <div class="chat-layout" id="chatLayout" style="display:none">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar">
        <div class="model-selector">
          <select id="modelSelect" onchange="switchModel(this.value)"></select>
          <button class="btn-icon" onclick="refreshModels()" title="Обновить список моделей">↻</button>
        </div>
        <div class="input-row">
          <textarea id="chatInput" rows="1" placeholder="Сообщение..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div class="settings-overlay" id="settingsOverlay" style="display:none" onclick="toggleSettings()">
    <div class="settings-panel" onclick="event.stopPropagation()">
      <div class="settings-header">
        <span>Настройки API</span>
        <button class="btn-icon" onclick="toggleSettings()">✕</button>
      </div>
      <div class="settings-body">
        <div class="field-group">
          <label>Название провайдера</label>
          <input id="providerName" value="OpenRouter" placeholder="OpenRouter">
        </div>
        <div class="field-group">
          <label>API Endpoint</label>
          <input id="apiUrl" value="https://openrouter.ai/api/v1" placeholder="https://api.openai.com/v1">
        </div>
        <div class="field-group">
          <label>API Key</label>
          <div class="key-row">
            <input id="apiKey" type="password" placeholder="sk-..." oninput="toggleKeyVis()">
            <button class="btn-icon" onclick="toggleKeyVis()" id="keyToggle">👁️</button>
          </div>
        </div>
        <div class="field-group">
          <label>System prompt (опционально)</label>
          <textarea id="systemPrompt" rows="3" placeholder="Ты — полезный ассистент..."></textarea>
        </div>
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">Подключить</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script src="js/app.js"></script>
</body>
</html>
